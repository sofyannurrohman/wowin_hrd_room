services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: hrd_room
      POSTGRES_USER: hrd_user
      POSTGRES_PASSWORD: hrd_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrd_user -d hrd_room"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      APP_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: hrd_user
      DB_PASSWORD: hrd_password
      DB_NAME: hrd_room
      JWT_SECRET: "hrd-room-super-secret-jwt-2026-change-in-prod"
      JWT_EXPIRY_HOURS: 24
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: 10
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/app/uploads:ro

volumes:
  postgres_data:
  uploads_data:
